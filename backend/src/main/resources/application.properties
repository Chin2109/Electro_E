spring.application.name=electro

# Configuration for Spring Datasource
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:elec}?options=-c%20timezone=UTC
spring.datasource.username=${DB_USERNAME:appuser}
spring.datasource.password=${DB_PASSWORD:apppass}

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway migration settings
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Cloudinary Settings
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# T?ng gi?i h?n upload file cho ?nh linh ki?n ?i?n t?
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB